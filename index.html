<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeFlySmart | Premier Flight Academy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A2540',
                        accent: '#F9A03F',
                        lightbg: '#F6F9FC'
                    },
                    fontFamily: {
                        en: ['Inter', 'sans-serif'],
                        ar: ['Cairo', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* التبديل بين الخطوط حسب لغة الصفحة */
        html[dir="ltr"] body { font-family: 'Inter', sans-serif; }
        html[dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        
        /* تأثيرات ناعمة */
        .transition-all { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-lightbg text-gray-800 antialiased">

    <header class="bg-primary fixed w-full top-0 z-50 shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            
            <a href="#" class="text-white text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-plane-departure text-accent"></i>
                <span data-i18n="logo">WeFlySmart</span>
            </a>

            <nav class="hidden md:flex items-center gap-8 text-white font-medium">
                <a href="#programs" class="hover:text-accent transition-all" data-i18n="nav_programs">Programs</a>
                <a href="#fleet" class="hover:text-accent transition-all" data-i18n="nav_fleet">Our Fleet</a>
                <a href="#about" class="hover:text-accent transition-all" data-i18n="nav_about">About Us</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="text-white hover:text-accent font-bold px-2 py-1 border border-transparent hover:border-accent rounded transition-all">
                    <i class="fas fa-globe mr-1 ml-1"></i> <span id="langBtnText">العربية</span>
                </button>
                
                <a href="#enroll" class="bg-accent hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded shadow-lg transition-all" data-i18n="nav_cta">
                    Start Flying
                </a>
            </div>

        </div>
    </header>

    <div class="h-24"></div>

    <section class="container mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl font-bold text-primary mb-6" data-i18n="hero_title">Earn Your Wings in the USA</h1>
        <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-10" data-i18n="hero_desc">FAA-certified flight training programs designed to take you from a beginner to a professional airline pilot. Safe, reliable, and smart.</p>
    </section>

    <script>
        // قاموس الترجمة
        const translations = {
            en: {
                logo: "WeFlySmart",
                nav_programs: "Programs",
                nav_fleet: "Our Fleet",
                nav_about: "About Us",
                nav_cta: "Start Flying",
                hero_title: "Earn Your Wings in the USA",
                hero_desc: "FAA-certified flight training programs designed to take you from a beginner to a professional airline pilot. Safe, reliable, and smart."
            },
            ar: {
                logo: "وي فلاي سمارت",
                nav_programs: "برامجنا",
                nav_fleet: "أسطولنا الطائر",
                nav_about: "من نحن",
                nav_cta: "ابدأ رحلتك",
                hero_title: "احصل على شارة الطيران من أمريكا",
                hero_desc: "برامج تدريب طيران معتمدة من إدارة الطيران الفيدرالية (FAA) مصممة لتأخذك من مبتدئ إلى طيار خطوط جوية محترف. أمان، موثوقية، واحترافية."
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            
            // تغيير اتجاه الصفحة
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            // تغيير نص زر اللغة
            document.getElementById('langBtnText').innerText = currentLang === 'en' ? 'العربية' : 'English';

            // تبديل كل النصوص اللي واخدة attribute data-i18n
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    element.innerText = translations[currentLang][key];
                }
            });
        }
    </script>
</body>
</html>
